<div class="messages-container">

    <!-- Conversations -->
  
    <div class="conversation-list">
  
      <h3>Messages</h3>
  
      <div
        class="conversation"
        *ngFor="let convo of conversations"
        (click)="selectConversation(convo)"
        [class.active]="activeConversation?.id === convo.id"
      >
        <div class="avatar">
          {{convo.name.charAt(0)}}
        </div>
  
        <div>
          <strong>{{convo.name}}</strong>
          <p class="preview">{{convo.lastMessage}}</p>
        </div>
      </div>
  
    </div>
  
    <!-- Chat Window -->
  
    <div class="chat-window" *ngIf="activeConversation">
  
      <div class="chat-header">
        <h3>{{activeConversation.name}}</h3>
      </div>
  
      <div class="chat-messages">
  
        <div
          *ngFor="let msg of activeConversation.messages"
          class="message"
          [class.mine]="msg.sender === currentUser"
        >
  
          {{msg.text}}
  
        </div>
  
      </div>
  
      <div class="chat-input">
  
        <input
          [(ngModel)]="newMessage"
          placeholder="Type a message..."
        >
  
        <button (click)="sendMessage()">
          Send
        </button>
  
      </div>
  
    </div>
  
  </div>
