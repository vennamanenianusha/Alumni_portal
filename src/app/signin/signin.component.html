<div class="signin-container">
  <div class="signin-wrapper">
    <!-- Header -->
    <div class="signin-header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </div>
      <h1>Alumni Portal</h1>
      <p>Secure Sign In</p>
    </div>

    <!-- Main Content -->
    <div class="signin-content">
      <!-- Form Section -->
      <form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)" class="login-form">
        <!-- Email Input -->
        <div class="form-group">
          <label for="email">Email Address</label>
          <input 
            type="email" 
            id="email"
            name="email" 
            placeholder="you@example.com"
            ngModel 
            required />
          <div class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="4" width="20" height="16" rx="2"></rect>
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
            </svg>
          </div>
        </div>

        <!-- Password Input -->
        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password"
            name="password" 
            placeholder="Enter your password"
            ngModel 
            required />
          <div class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
          </div>
        </div>

        <!-- Role Selection -->
        <div class="form-group role-selector">
          <label>Login As</label>
          <div class="role-buttons">
            <div class="role-option">
              <input type="radio" id="role-student" name="role" value="student" ngModel required />
              <label for="role-student">
                <span class="role-icon">👤</span>
                Student
              </label>
            </div>
            <div class="role-option">
              <input type="radio" id="role-admin" name="role" value="admin" ngModel />
              <label for="role-admin">
                <span class="role-icon">⚙️</span>
                Admin
              </label>
            </div>
          </div>
        </div>

        <!-- Sign In Button -->
        <button type="submit" class="btn-signin">Sign In</button>
      </form>

      <!-- Divider -->
      <div class="divider">
        <span>or</span>
      </div>

      <!-- Google Sign In -->
      <button type="button" class="btn-google" (click)="loginWithGoogle()" id="google-signin-btn">
        <svg viewBox="0 0 24 24" fill="currentColor" class="google-icon">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        <span>Sign in with Google</span>
      </button>

      <!-- SAML Sign In -->
      <button type="button" class="btn-saml" (click)="loginWithSAML()">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
        </svg>
        Sign in with SAML
      </button>

      <!-- Footer Links -->
      <div class="signin-footer">
        <a href="#" class="footer-link">Forgot your password?</a>
        <span class="divider-inline">•</span>
        <a href="#" class="footer-link">Create Account</a>
      </div>
    </div>

    <!-- Right Panel Info -->
    <div class="signin-info">
      <div class="info-content">
        <h3>Welcome Back</h3>
        <p>Connect with alumni, explore opportunities, and grow your professional network.</p>
        <ul class="info-features">
          <li>
            <span class="feature-icon">✓</span>
            <span>Access exclusive job postings</span>
          </li>
          <li>
            <span class="feature-icon">✓</span>
            <span>Mentorship programs</span>
          </li>
          <li>
            <span class="feature-icon">✓</span>
            <span>Network with professionals</span>
          </li>
        </ul>
      </div>
    </div>
  </div>
</div>
