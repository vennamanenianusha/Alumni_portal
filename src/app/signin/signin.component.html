<div class="container">
    <section id="content">
      <form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)">
        <h1>Login Form</h1>
  
        <!-- Username / Email -->
        <div>
          <input 
            type="text" 
            placeholder="Username / Email" 
            id="username" 
            name="email" 
            ngModel 
            required />
        </div>
  
        <!-- Password -->
        <div>
          <input 
            type="password" 
            placeholder="Password" 
            id="password" 
            name="password" 
            ngModel 
            required />
        </div>
  
        <!-- Role selection -->
        <div class="radio-group" role="radiogroup" aria-label="Select role">
          <input type="radio" id="role-student" name="role" value="student" ngModel required />
          <label for="role-student" class="chip">Student</label>
  
          <input type="radio" id="role-admin" name="role" value="admin" ngModel />
          <label for="role-admin" class="chip">Admin</label>
        </div>
  
        <!-- Submit -->
        <div>
          <button type="submit">Log in</button>
          <a href="#">Lost your password?</a>
          <a href="#">Register</a>
        </div>
      </form>
    </section>
  </div>
